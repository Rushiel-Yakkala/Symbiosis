version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: m4_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: m4_mongodb
    ports:
      - "27017:27017"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: m4_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    restart: unless-stopped

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      until /usr/bin/mc alias set myminio http://minio:9000 admin password123; do echo 'Waiting for MinIO...'; sleep 1; done;
      /usr/bin/mc mb myminio/video-synopsis-audio || true;
      exit 0;
      "
